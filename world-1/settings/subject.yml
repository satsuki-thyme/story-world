    - item group: 野菜
      contents:

        - item: 大薊（おおあざみ）
          contents:
            正しくは朝鮮薊
            アーティチョーク
            本格的に栽培され始めたのは15世紀イタリアのナポリ近辺で、16世紀からフランス・ドイツ・イギリスへと徐々にヨーロッパ全域に広がった

- item group: 物質
  contents:

    - item: 神素
      contents:
        神を構成する要素
        攻撃をほぼ無効化して侵しがたく、影響を及ぼすときは極めて強く作用する
        粒子で構成されておらず、炎などの現象に近い性質をしている
        基本的には透きとおっているが構成主体である神の意志に従って変幻自在

- item group: 物品
  contents:

    - item: 収納石
      hints: 収納結晶, 吸石, 吸収石
      contents:
        精神を持たない物体を情報として吸収・取り出しすることができる。
        情報の複製はできない。
        吸収・取り出しは魔力の簡単な操作で行える。
        吸収・取り出しの魔力操作は作者によって多少の違いがあるがおよそ似たり寄ったりになっている。
        中には吸収・取り出しに特別な操作を必要とするものもあり商人が高額な商品などを納める際に使われている。ただし他人が破れないわけではない。

    - item: 魔結晶
      contents:
        魔物の体内に生成される結晶
        魔法力、魔力との親和性が高い

    - item: レプリノ
      contents:
        魔力と反発する布
        作り方
          用意するもの
            ｜翼手魔狼《プテラグルヴ》の飛膜
            アルテエーテル（魔法力回復薬）
            魔法石（魔力を内包できる石）の粉末
            ミスリルの板
          手順
            1. 月光の下で｜翼手魔狼《プテラグルヴ》の飛膜をアルテエーテルに一晩浸ける
            2. 1. に魔法石の粉末をまぶす
            3. 2. をミスリルの板ではさむ
            4. 3. に高圧で魔力をかける

- item group: 妖精
  contents:

    - item: 翼妖精
      contents:
        妖精の森に暮らしている
        妖精の森の、風の魔力に惹かれている
        森の魔力を森の外に持ち出す役割をしている（当人に自覚はない）

